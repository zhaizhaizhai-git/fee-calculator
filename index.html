<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究生个人学术服务 - 精准结算中心</title>
    <style>
        :root {
            --primary: #0f172a; /* 睿智深蓝 */
            --accent: #b45309;  /* 学术金 */
            --success: #065f46; /* 严谨绿 */
            --bg: #f8fafc;
        }

        body {
            font-family: -apple-system, "Noto Sans SC", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            border-top: 8px solid var(--accent);
            position: relative;
        }

        .identity-tag {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .promise-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 25px;
        }
        .promise-item {
            background: #fffcf0;
            border: 1px solid #fef3c7;
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
        }
        .promise-icon { font-size: 18px; margin-bottom: 4px; display: block; }
        .promise-text { font-size: 11px; color: var(--accent); font-weight: 800; }

        h2 { text-align: center; margin: 10px 0 5px 0; font-size: 20px; color: var(--primary); }
        .subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 30px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fcfcfc;
        }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        .btn-group { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 12px; margin-top: 25px; }
        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc { background: var(--primary); color: white; font-size: 16px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
        .btn-copy { background: #f1f5f9; color: #475569; font-size: 14px; }
        button:active { transform: translateY(2px); }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 18px;
            border: 1px solid #e2e8f0;
        }
        .result-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .price-label { font-size: 14px; font-weight: 500; }
        .price-value { font-size: 26px; font-weight: 900; color: var(--success); }
        .urgent .price-value { color: #dc2626; }
        
        .calc-formula {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 10px;
            text-align: right;
            font-style: italic;
        }

        .section-title { width: 100%; max-width: 420px; font-weight: 800; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .gallery {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .gallery img {
            width: 210px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            flex-shrink: 0;
            border: 1px solid #fff;
        }

        .personal-note {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
            line-height: 1.6;
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="identity-tag">研究生个人接单</div>
    
    <div class="promise-grid">
        <div class="promise-item"><span class="promise-icon">✍️</span><span class="promise-text">纯手工修改</span></div>
        <div class="promise-item"><span class="promise-icon">📐</span><span class="promise-text">免费调格式</span></div>
        <div class="promise-item"><span class="promise-icon">🛡️</span><span class="promise-text">售后至满意</span></div>
    </div>

    <h2>个人学术润色结算</h2>
    <p class="subtitle">学长/学姐亲自上手 · 按重灾区计费 · 更省钱</p>

    <div class="input-group">
        <label>论文总字数</label>
        <input type="number" id="words" placeholder="请输入总字数" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>当前重复率/AIGC率 (%)</label>
        <input type="number" id="rate" placeholder="例如: 35.5" oninput="calculate()">
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">精准试算报价</button>
        <button class="btn-copy" onclick="copyResult()">复制结算单</button>
    </div>

    <div class="result-box">
        <div class="result-item">
            <span class="price-label">手工修改报价：</span>
            <span class="price-value" id="normalPrice">￥0.00</span>
        </div>
        <div class="result-item urgent">
            <span class="price-label">24H极速加急：</span>
            <span class="price-value" id="urgentPrice">￥0.00</span>
        </div>
        <div class="calc-formula" id="formulaDesc">计费公式：需处理字数 × 0.012</div>
    </div>
</div>

<div class="section-title">✨ 我的手工修改案例展示</div>
<div class="gallery">
    <img src="微信图片_20260503221213_13_68(1).jpg" alt="案例1">
    <img src="微信图片_20260503221214_14_68(1).jpg" alt="案例2">
    <img src="微信图片_20260503221215_15_68(1).jpg" alt="案例3">
    <img src="微信图片_20260503221215_16_68(1).jpg" alt="案例4">
</div>

<div class="personal-note">
    <strong>💡 计费说明：</strong><br>
    仅针对重复部分收费（总字数 × 重复率），单价为 <strong>12元/1000字</strong>。个人纯手工逐句重构，拒绝AI。<strong>报价已包含文档格式规范化调整</strong>，包售后直到审核满意。
</div>

<script>
function calculate() {
    const words = parseFloat(document.getElementById('words').value) || 0;
    const rate = parseFloat(document.getElementById('rate').value) || 0;
    
    const normalPriceEl = document.getElementById('normalPrice');
    const urgentPriceEl = document.getElementById('urgentPrice');
    const formulaEl = document.getElementById('formulaDesc');

    if (words <= 0 || rate <= 0) {
        normalPriceEl.innerText = "￥0.00";
        urgentPriceEl.innerText = "￥0.00";
        return;
    }

    // 需修改字数 = 总字数 * (重复率 / 100)
    const modifiedWords = (words * rate) / 100;
    
    // 计费：(需修改字数 / 1000) * 12
    const finalNormal = (modifiedWords / 1000) * 12;
    const finalUrgent = finalNormal + 50; 

    normalPriceEl.innerText = "￥" + finalNormal.toFixed(2);
    urgentPriceEl.innerText = "￥" + finalUrgent.toFixed(2);
    formulaEl.innerText = `需处理约 ${Math.round(modifiedWords)} 字 × 0.012`;
}

function copyResult() {
    const normal = document.getElementById('normalPrice').innerText;
    const urgent = document.getElementById('urgentPrice').innerText;
    const words = document.getElementById('words').value;
    const rate = document.getElementById('rate').value;
    
    if (!words || !rate) {
        alert("请输入字数和重复率");
        return;
    }

    // 构造包含加急报价的文案
    const text = `【研究生个人接单·精准结算单】\n————————————————\n论文总字数：${words}\n当前重复率：${rate}%\n计费标准：12元/1000重复字\n\n💰 普通修改报价：${normal}\n🚀 24H加急报价：${urgent}\n————————————————\n⭐ 服务承诺：纯手工重构、包调格式、包售后直至满意。`;
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
            alert("包含加急报价的结算单已复制！");
        });
    } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert("结算单已复制！");
    }
}
</script>

</body>
</html>
