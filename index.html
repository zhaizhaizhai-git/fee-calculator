<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业降重/降AIGC费用计算器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #1976d2;
            --accent-color: #2e7d32;
            --bg-color: #f0f4f8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        h2 { text-align: center; color: #1a237e; margin-top: 0; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-top: -10px; margin-bottom: 25px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #444; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary-color); }

        .btn-box { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        button.scan-btn { background: #546e7a; }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f1f8e9;
            border-radius: 12px;
            border-left: 5px solid var(--accent-color);
        }

        .result-item { display: flex; justify-content: space-between; margin: 10px 0; align-items: center; }
        .price { color: var(--accent-color); font-size: 22px; font-weight: 800; }
        .urgent { color: #d32f2f; }

        /* 成功案例样式 */
        .case-title { width: 100%; max-width: 450px; margin-bottom: 15px; font-weight: bold; color: #333; }
        .case-gallery {
            width: 100%;
            max-width: 450px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
        }
        .case-gallery img {
            width: 200px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        #reader { margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .tip { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>

<body>

<div class="container">
    <h2>降AIGC / 降重试算</h2>
    <p class="subtitle">智能优化文本 · 提升原创度 · 学术合规</p>

    <div class="input-group">
        <label>待处理总字数</label>
        <input type="number" id="words" placeholder="输入总字数" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>当前报告重复率/AIGC率 (%)</label>
        <input type="number" id="rate" placeholder="例如: 68" oninput="calculate()">
    </div>

    <div class="btn-box">
        <button onclick="calculate()">立即计算</button>
        <button class="scan-btn" onclick="startScan()">扫码填写</button>
    </div>

    <div id="reader"></div>

    <div class="result-box">
        <div class="result-item">
            <span>标准优化费用：</span>
            <span class="price" id="normalPrice">￥0.00</span>
        </div>
        <div class="result-item">
            <span>极速加急(24H内)：</span>
            <span class="price urgent" id="urgentPrice">￥0.00</span>
        </div>
    </div>
    
    <p class="tip">注：阶梯定价逻辑，重复率越高工作量越大，费用相应增加。</p>
</div>

<div class="case-title">✨ 成功案例展示</div>
<div class="case-gallery">
    <!-- 这里引用你GitHub仓库里上传的图片文件名 -->
    <img src="微信图片_20260503221213_13_68(1).jpg" alt="案例1">
    <img src="微信图片_20260503221214_14_68(1).jpg" alt="案例2">
    <img src="微信图片_20260503221215_15_68(1).jpg" alt="案例3">
    <img src="微信图片_20260503221215_16_68(1).jpg" alt="案例4">
</div>

<script>
function calculate() {
    let words = parseFloat(document.getElementById('words').value) || 0;
    let rate = parseFloat(document.getElementById('rate').value) || 0;

    if (words <= 0) {
        document.getElementById('normalPrice').innerText = "￥0.00";
        document.getElementById('urgentPrice').innerText = "￥0.00";
        return;
    }

    // 计费逻辑：基础价 12元/千字
    let baseRate = 12;
    
    // 难度加成：根据当前重复率调整
    let difficultyExtra = 0;
    if (rate > 70) {
        difficultyExtra = 30; // 高难度加30元
    } else if (rate > 40) {
        difficultyExtra = 15; // 中难度加15元
    } else if (rate > 20) {
        difficultyExtra = 5;  // 低难度加5元
    }

    let basePrice = (words / 1000) * baseRate + difficultyExtra;
    let urgentPrice = basePrice + 50; // 加急固定+50

    document.getElementById('normalPrice').innerText = "￥" + basePrice.toFixed(2);
    document.getElementById('urgentPrice').innerText = "￥" + urgentPrice.toFixed(2);
}

function startScan() {
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {
            let parts = qrCodeMessage.split(/[，,]/);
            if (parts.length >= 2) {
                document.getElementById('words').value = parts[0];
                document.getElementById('rate').value = parts[1];
                calculate();
            }
            html5QrCode.stop();
        },
        error => {}
    );
}
</script>

</body>
</html>
