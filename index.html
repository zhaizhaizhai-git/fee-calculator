<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究生个人学术服务 - 结算中心</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #0f172a; /* 睿智深蓝 */
            --accent: #b45309;  /* 学术金 */
            --success: #065f46; /* 严谨绿 */
            --bg: #f8fafc;
        }

        body {
            font-family: -apple-system, "Noto Sans SC", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            border-top: 8px solid var(--accent);
            position: relative;
        }

        /* 个人身份标签 */
        .identity-tag {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        /* 核心承诺展示区 */
        .promise-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 25px;
        }
        .promise-item {
            background: #fffcf0;
            border: 1px solid #fef3c7;
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
        }
        .promise-icon { font-size: 18px; margin-bottom: 4px; display: block; }
        .promise-text { font-size: 11px; color: var(--accent); font-weight: 800; }

        h2 { text-align: center; margin: 10px 0 5px 0; font-size: 20px; color: var(--primary); }
        .subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 30px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fcfcfc;
        }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc { background: var(--primary); color: white; grid-column: span 2; font-size: 16px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
        .btn-scan { background: #f1f5f9; color: #475569; }
        .btn-copy { background: #f1f5f9; color: #475569; }
        button:active { transform: translateY(2px); }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 18px;
            border: 1px solid #e2e8f0;
        }
        .result-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
        .price-label { font-size: 14px; font-weight: 500; }
        .price-value { font-size: 26px; font-weight: 900; color: var(--success); }
        .urgent .price-value { color: #dc2626; }

        #reader { margin-top: 15px; border-radius: 15px; overflow: hidden; }

        /* 成功案例区 */
        .section-title { width: 100%; max-width: 420px; font-weight: 800; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .gallery {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .gallery img {
            width: 210px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            flex-shrink: 0;
            border: 1px solid #fff;
        }

        .personal-note {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
            line-height: 1.6;
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="identity-tag">研究生个人接单</div>
    
    <div class="promise-grid">
        <div class="promise-item"><span class="promise-icon">✍️</span><span class="promise-text">纯手工修改</span></div>
        <div class="promise-item"><span class="promise-icon">📐</span><span class="promise-text">免费调格式</span></div>
        <div class="promise-item"><span class="promise-icon">🛡️</span><span class="promise-text">售后至满意</span></div>
    </div>

    <h2>个人学术润色结算</h2>
    <p class="subtitle">学长/学姐亲自上手 · 拒绝AI · 保证原创度</p>

    <div class="input-group">
        <label>待处理总字数</label>
        <input type="number" id="words" placeholder="请输入字数" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>当前重复率/AIGC率 (%)</label>
        <input type="number" id="rate" placeholder="例如: 65" oninput="calculate()">
    </div>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">获取个人服务报价</button>
        <button class="btn-scan" id="scanBtn" onclick="toggleScan()">扫码导入</button>
        <button class="btn-copy" onclick="copyResult()">复制结算详情</button>
    </div>

    <div id="reader"></div>

    <div class="result-box">
        <div class="result-item">
            <span class="price-label">标准润色 (包含格式)：</span>
            <span class="price-value" id="normalPrice">￥0.00</span>
        </div>
        <div class="result-item urgent">
            <span class="price-label">24H加急处理：</span>
            <span class="price-value" id="urgentPrice">￥0.00</span>
        </div>
    </div>
</div>

<div class="section-title">✨ 我的手工修改案例展示</div>
<div class="gallery">
    <img src="微信图片_20260503221213_13_68(1).jpg" alt="案例1">
    <img src="微信图片_20260503221214_14_68(1).jpg" alt="案例2">
    <img src="微信图片_20260503221215_15_68(1).jpg" alt="案例3">
    <img src="微信图片_20260503221215_16_68(1).jpg" alt="案例4">
</div>

<div class="personal-note">
    <strong>💡 郑重承诺：</strong><br>
    本人接单后由个人纯手工修改，非团队外包。报价包含基础字数费及难度补偿，<strong>费用已含文档格式规范化调整</strong>。所有稿件包售后直到你审核满意为止。
</div>

<script>
let html5QrCode;

function calculate() {
    const words = parseFloat(document.getElementById('words').value) || 0;
    const rate = parseFloat(document.getElementById('rate').value) || 0;
    
    if (words <= 0) {
        document.getElementById('normalPrice').innerText = "￥0.00";
        document.getElementById('urgentPrice').innerText = "￥0.00";
        return;
    }

    // 核心定价：12元 / 1000字
    const basePrice = (words / 1000) * 12;

    // 难度及手工溢价 (重复率越高，手工重写的工作量呈指数增长)
    let extra = 0;
    if (rate > 80) extra = 35;      // 几乎全篇重写
    else if (rate > 50) extra = 20; // 较多改动
    else if (rate > 20) extra = 10; // 少量优化

    const finalNormal = basePrice + extra;
    const finalUrgent = finalNormal + 50; 

    document.getElementById('normalPrice').innerText = "￥" + finalNormal.toFixed(2);
    document.getElementById('urgentPrice').innerText = "￥" + finalUrgent.toFixed(2);
}

async function toggleScan() {
    const btn = document.getElementById('scanBtn');
    if (html5QrCode && html5QrCode.isScanning) {
        await html5QrCode.stop();
        btn.innerText = "扫码导入";
        return;
    }
    html5QrCode = new Html5Qrcode("reader");
    btn.innerText = "停止扫码";
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {
            const parts = qrCodeMessage.split(/[，,]/);
            if (parts.length >= 2) {
                document.getElementById('words').value = parts[0];
                document.getElementById('rate').value = parts[1];
                calculate();
                toggleScan();
            }
        },
        error => {}
    );
}

function copyResult() {
    const normal = document.getElementById('normalPrice').innerText;
    const words = document.getElementById('words').value;
    const text = `【研究生个人接单·结算单】\n————————————————\n服务说明：纯手工润色 + 格式调优\n待处理字数：${words}\n预估总费用：${normal}\n————————————————\n⭐ 个人承诺：包调格式、包售后直至满意、绝不使用AI。`;
    
    navigator.clipboard.writeText(text).then(() => {
        alert("结算单已复制！快发给你的同学/客户吧~");
    }).catch(err => {
        alert("复制失败，请尝试截图保存");
    });
}
</script>

</body>
</html>
